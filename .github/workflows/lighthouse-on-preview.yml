name: Lighthouse on Preview

# Reusable workflow. Consumers wire it up with an `on: deployment_status`
# trigger in their own workflow that calls this one.
#
# Example consumer usage:
#
#   on:
#     deployment_status:
#
#   jobs:
#     lighthouse:
#       if: github.event.deployment_status.state == 'success'
#       uses: toddwilkens/.github/.github/workflows/lighthouse-on-preview.yml@v1
#       with:
#         preview-url: ${{ github.event.deployment_status.target_url }}
#         seo-threshold: 0.95
#       secrets:
#         vercel-bypass-secret: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

on:
  workflow_call:
    inputs:
      preview-url:
        description: "The Vercel preview deployment URL to audit."
        required: true
        type: string
      seo-threshold:
        description: >
          Minimum Lighthouse SEO score (0.0–1.0) that must pass. Defaults to
          0.95 (95). The job fails if the score falls below this value.
        required: false
        type: number
        default: 0.95
    secrets:
      vercel-bypass-secret:
        description: >
          Vercel Automation Bypass Secret. Passed as the
          `x-vercel-protection-bypass` header so Lighthouse can reach password-
          protected preview deployments. Required if preview protection is
          enabled on the Vercel project.
        required: false

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for lighthouserc config if present)
        uses: actions/checkout@v4

      - name: Write Lighthouse CI config
        shell: bash
        run: |
          cat > lighthouserc.json << EOF
          {
            "ci": {
              "collect": {
                "url": ["${{ inputs.preview-url }}"],
                "numberOfRuns": 1,
                "settings": {
                  "extraHeaders": {
                    "x-vercel-protection-bypass": "${{ secrets.vercel-bypass-secret }}"
                  }
                }
              },
              "assert": {
                "assertions": {
                  "categories:seo": ["error", {"minScore": ${{ inputs.seo-threshold }}}]
                }
              },
              "upload": {
                "target": "temporary-public-storage"
              }
            }
          }
          EOF

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report SEO score
        if: always()
        shell: bash
        run: |
          # Surface score in the step summary for easy dashboard reading.
          REPORT=$(find .lighthouseci -name '*.json' | head -1)
          if [[ -f "$REPORT" ]]; then
            SEO=$(python3 -c "
          import json, sys
          d = json.load(open('$REPORT'))
          cats = d.get('categories', {})
          seo = cats.get('seo', {}).get('score', 'N/A')
          print(seo)
          " 2>/dev/null || echo "N/A")
            echo "### Lighthouse SEO score: ${SEO}" >> "$GITHUB_STEP_SUMMARY"
            echo "Threshold: ${{ inputs.seo-threshold }}" >> "$GITHUB_STEP_SUMMARY"
            echo "Preview URL: ${{ inputs.preview-url }}" >> "$GITHUB_STEP_SUMMARY"
          fi
